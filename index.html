<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Carte Micro-Entrepreneur | GHAZALI MOHAMED KAMAL</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        anae: {
                            blue: '#29b1cc',
                            teal: '#10b981',
                            darkTeal: '#059669',
                            activityBlue: '#4dd0e1'
                        }
                    },
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'],
                        arabic: ['Cairo', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #29b1cc; 
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .font-arabic { font-family: 'Cairo', sans-serif; line-height: 1.2; }
        .card-shadow { box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2); }
        .watermark {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            opacity: 0.04;
            pointer-events: none;
        }
        .tracking-tight-custom { letter-spacing: -0.02em; }
    </style>
</head>
<body class="min-h-screen py-6 px-4 flex flex-col items-center">

    <script>
        const userData = {
            cardNumber: "92471053", // Random but realistic 8-digit format
            address: "LOT N°12 RUE DES MARTYRS, CHERAGA, ALGER",
            expiryDate: "22-05-2029",
            username: "GHAZALI MOHAMED KAMAL",
            nameAr: "غزالي محمد كمال",
            photoUrl: "https://ui-avatars.com/api/?name=Ghazali+Mohamed+Kamal&background=f1f5f9&color=0f172a&size=256", 
            activities: [
                { title: "Production de contenus audiovisuels et numériques", code: "082104" },
                { title: "Conseil en communication et marketing digital", code: "091202" },
                { title: "Photographe professionnel d'événements", code: "082107" },
                { title: "Montage et post-production vidéo", code: "082109" }
            ]
        };
    </script>

    <div class="w-full max-w-md">
        <div class="bg-white rounded-[28px] card-shadow overflow-hidden relative p-6 pt-8 mb-6">
            
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/77/Emblem_of_Algeria.svg" class="watermark" alt="">

            <div class="flex items-center gap-2 mb-6">
                <span class="text-black font-extrabold text-[19px] tracking-tight-custom">Carte N°</span>
                <span class="bg-[#10b981] text-white text-[13px] font-bold px-3 py-1 rounded-md flex items-center gap-1.5 shadow-sm">
                    <i data-lucide="check-circle-2" class="w-3.5 h-3.5 fill-white text-[#10b981]"></i>
                    <span id="card-num-val"></span>
                </span>
            </div>

            <div class="mb-5">
                <p class="text-black font-extrabold text-[16px] mb-1 tracking-tight-custom">Adresse du lieu d'activité :</p>
                <p id="address-val" class="text-anae-teal font-bold text-[14px] leading-tight uppercase tracking-tight"></p>
            </div>

            <div class="flex items-center gap-2 mb-8 text-[15px]">
                <i data-lucide="clock" class="w-4 h-4 text-gray-700"></i>
                <span class="text-gray-800 font-medium">Valide jusqu'au</span>
                <span id="date-val" class="text-anae-teal font-extrabold"></span>
            </div>

            <div class="flex items-start gap-4 mb-6 border-t border-gray-100 pt-6">
                <div class="relative shrink-0">
                    <img id="profile-img" src="" class="w-[82px] h-[82px] rounded-full border-[2.5px] border-gray-900 p-0.5 object-cover bg-slate-50">
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex justify-between items-start mb-0">
                        <div class="truncate">
                            <h2 class="font-extrabold text-gray-900 text-[14px] tracking-tighter truncate uppercase">@<span id="username-val"></span></h2>
                        </div>
                        <div class="flex text-[#10b981] gap-0.5 shrink-0 ml-1">
                            <i data-lucide="star" class="w-3.5 h-3.5 fill-current"></i>
                            <i data-lucide="star" class="w-3.5 h-3.5 fill-current"></i>
                            <i data-lucide="star" class="w-3.5 h-3.5 fill-current"></i>
                            <i data-lucide="star" class="w-3.5 h-3.5 fill-current"></i>
                            <i data-lucide="star" class="w-3.5 h-3.5 fill-current"></i>
                        </div>
                    </div>
                    <h2 id="name-ar-val" class="font-arabic font-extrabold text-gray-900 text-[21px] text-right mb-4" dir="rtl"></h2>
                    
                    <div class="flex gap-2">
                        <button class="border-[1.5px] border-gray-900 rounded-full px-3 py-1 text-[10px] font-extrabold text-gray-900 uppercase active:bg-gray-100 transition-colors">+ S'inscrire</button>
                        <button class="border-[1.5px] border-gray-900 rounded-full px-3 py-1 text-[10px] font-extrabold text-gray-900 uppercase active:bg-gray-100 transition-colors">Mon Profil</button>
                        <button class="border-[1.5px] border-gray-900 rounded-full p-1.5 text-gray-900">
                            <i data-lucide="user" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="space-y-6 border-t border-gray-100 pt-6 mb-10" id="activities-list">
                </div>

            <button class="w-full bg-[#10b981] hover:bg-emerald-600 text-white font-extrabold py-4 rounded-full flex items-center justify-center gap-3 shadow-lg transition-transform active:scale-95 shadow-emerald-500/20">
                <i data-lucide="check-circle-2" class="w-6 h-6 fill-white text-[#10b981]"></i>
                <span class="tracking-[0.12em] text-[18px] uppercase">Carte Active</span>
            </button>
        </div>

        <p class="text-center text-white/70 text-[10px] font-bold tracking-widest uppercase mb-8">Authenticité Vérifiée • Portail ANAE</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Setup icons
            lucide.createIcons();
            
            // Map Data to UI
            document.getElementById('card-num-val').textContent = userData.cardNumber;
            document.getElementById('address-val').textContent = userData.address;
            document.getElementById('date-val').textContent = userData.expiryDate;
            document.getElementById('username-val').textContent = userData.username;
            document.getElementById('name-ar-val').textContent = userData.nameAr;
            document.getElementById('profile-img').src = userData.photoUrl;

            // Generate Activities
            const list = document.getElementById('activities-list');
            userData.activities.forEach(item => {
                const container = document.createElement('div');
                container.className = "flex flex-col gap-1.5";
                container.innerHTML = `
                    <p class="text-black font-extrabold text-[15px] leading-[1.3] tracking-tight-custom">${item.title}</p>
                    <div>
                        <span class="bg-[#4dd0e1] text-white text-[12px] font-extrabold px-2.5 py-0.5 rounded-md shadow-sm">${item.code}</span>
                    </div>
                `;
                list.appendChild(container);
            });
        });
    </script>
</body>
</html>
